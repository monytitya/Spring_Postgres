spring.application.name=Meangsreang
server.port=9090

# Default development datasource: in-memory H2
spring.datasource.url=jdbc:h2:mem:meangsreangdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# PostgreSQL settings can be used instead when Postgres is available
# spring.datasource.url=jdbc:postgresql://localhost:5432/transection_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect