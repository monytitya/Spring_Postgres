<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHQR Premium Payment - Bakong</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E30613;
            --primary-dark: #b3050f;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --pending: #eab308;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(227, 6, 19, 0.2);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(227, 6, 19, 0.3);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 6, 19, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #qrSection {
            display: none;
            text-align: center;
            margin-top: 30px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #qrImage {
            width: 220px;
            height: 220px;
            display: block;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-pending {
            background: rgba(234, 179, 8, 0.1);
            color: var(--pending);
            border: 1px solid rgba(234, 179, 8, 0.2);
        }

        .status-success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .ref-text {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid currentColor;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="paymentCard">
            <div class="header">
                <span class="logo">🇰🇭</span>
                <h1>KHQR Payment</h1>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">Secure Bakong Payment Integration</p>
            </div>

            <div id="setupSection">
                <div class="form-group">
                    <label for="amount">Payment Amount</label>
                    <div class="input-wrapper">
                        <input type="number" id="amount" placeholder="0.00" step="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <label for="currency">Currency</label>
                    <select id="currency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="KHR">KHR - Khmer Riel</option>
                    </select>
                </div>

                <button id="generateBtn" onclick="generateQR()">Generate QR Code</button>
            </div>

            <div id="qrSection">
                <div class="status-badge status-pending" id="statusBadge">
                    <span class="spinner"></span>
                    <span id="statusText">Waiting for payment...</span>
                </div>
                
                <div class="qr-container">
                    <img id="qrImage" alt="KHQR Code">
                </div>
                
                <p class="ref-text" id="transactionId">Ref: --</p>
                
                <button style="background: rgba(255,255,255,0.05); color: var(--text-muted); margin-top: 20px; box-shadow: none;" onclick="resetForm()">
                    Cancel Transaction
                </button>
            </div>
        </div>
    </div>

    <script>
        let pollingInterval;
        let currentTxnId;

        async function generateQR() {
            const amount = document.getElementById('amount').value;
            const currency = document.getElementById('currency').value;
            const btn = document.getElementById('generateBtn');

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Generating...';

            try {
                const res = await fetch('/api/payment/generate-qr', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: parseFloat(amount), currency })
                });

                if (!res.ok) throw new Error('Failed to generate QR');

                const data = await res.json();
                currentTxnId = data.transactionId;

                // Update UI
                document.getElementById('qrImage').src = data.qrImageBase64;
                document.getElementById('transactionId').innerText = 'Reference: ' + data.transactionId;
                
                document.getElementById('setupSection').style.display = 'none';
                document.getElementById('qrSection').style.display = 'block';

                // Start polling every 3 seconds
                pollingInterval = setInterval(checkStatus, 3000);
            } catch (err) {
                alert('Error: ' + err.message);
                btn.disabled = false;
                btn.innerText = 'Generate QR Code';
            }
        }

        async function checkStatus() {
            try {
                const res = await fetch('/api/payment/check-status/' + currentTxnId);
                const data = await res.json();

                if (data.status === 'SUCCESS') {
                    clearInterval(pollingInterval);
                    const badge = document.getElementById('statusBadge');
                    badge.className = 'status-badge status-success';
                    badge.innerHTML = '<span>✅</span> <span>Payment Successful!</span>';
                    
                    // Add success animation to card
                    document.getElementById('paymentCard').style.transform = 'scale(1.02)';
                    setTimeout(() => {
                        document.getElementById('paymentCard').style.transform = 'scale(1)';
                    }, 500);
                }
            } catch (err) {
                console.error('Status check failed', err);
            }
        }

        function resetForm() {
            clearInterval(pollingInterval);
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('qrSection').style.display = 'none';
            document.getElementById('generateBtn').disabled = false;
            document.getElementById('generateBtn').innerText = 'Generate QR Code';
            document.getElementById('amount').value = '';
        }
    </script>
</body>
</html>
